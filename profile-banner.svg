  <rect x="200" y="292" width="54" height="20" rx="10" fill="rgba(97,218,251,0.07)"  stroke="rgba(97,218,251,0.25)"  stroke-width="1"/>
  <text x="227" y="306" font-family="'Courier New', monospace" font-size="9" fill="#61dafb" text-anchor="middle" font-weight="700">React</text>
