  <text x="40" y="374" font-family="'Courier New', monospace" font-size="9" fill="#3d4f6a" letter-spacing="1.5">&#x2709;  motlalepulasello5@gmail.com</text>
  <text x="40" y="392" font-family="'Courier New', monospace" font-size="9" fill="#3d4f6a" letter-spacing="1.5">&#x25C8;  open to collaborations &amp; freelance</text>

