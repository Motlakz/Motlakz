  <text x="51" y="48" font-family="'Courier New', monospace" font-size="9.5" fill="#c8f542" letter-spacing="2.5">FULL STACK ENGINEER  ·  JHB, ZA</text>

  <!-- Name -->
  <text x="40" y="108" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="700" fill="#dce4f0" letter-spacing="-1.5">Motlalepula</text>
  <text x="40" y="162" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700" font-style="italic" fill="none" stroke="url(#limeCyan)" stroke-width="1.5" letter-spacing="-2">Sello</text>
  <!-- Sello filled underneath for depth -->
  <text x="40" y="162" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700" font-style="italic" fill="#c8f542" opacity="0.15" letter-spacing="-2">Sello</text>

  <!-- Bio — the actual intro -->
  <text x="40" y="194" font-family="'Courier New', monospace" font-size="11" fill="#8494b0" letter-spacing="0.2">I build things people pay for. Six shipped SaaS products,</text>
  <text x="40" y="210" font-family="'Courier New', monospace" font-size="11" fill="#8494b0" letter-spacing="0.2">300+ sign-ups, a 4&#x2605; average — and I'm just getting started.</text>
  <text x="40" y="232" font-family="'Courier New', monospace" font-size="11" fill="#58667a" letter-spacing="0.2">Ruby on the server. JavaScript everywhere else.</text>
  <text x="40" y="248" font-family="'Courier New', monospace" font-size="11" fill="#58667a" letter-spacing="0.2">Rails for reliability, Next.js for reach.</text>

  <!-- Divider -->
  <line x1="40" y1="268" x2="410" y2="268" stroke="#1a2235" stroke-width="1"/>

  <!-- STACK SECTION label -->
  <text x="40" y="284" font-family="'Courier New', monospace" font-size="8.5" fill="#3d4f6a" letter-spacing="2.5">STACK</text>

  <!-- Pills row 1 -->
  <!-- JS -->
  <rect x="40"  y="292" width="76" height="20" rx="10" fill="rgba(247,223,30,0.07)"  stroke="rgba(247,223,30,0.28)"  stroke-width="1"/>
  <text x="78"  y="306" font-family="'Courier New', monospace" font-size="9" fill="#f7df1e" text-anchor="middle" font-weight="700">JavaScript</text>
  <!-- TS -->
  <rect x="122" y="292" width="72" height="20" rx="10" fill="rgba(77,158,255,0.08)"  stroke="rgba(77,158,255,0.28)"  stroke-width="1"/>
  <text x="158" y="306" font-family="'Courier New', monospace" font-size="9" fill="#4d9eff" text-anchor="middle" font-weight="700">TypeScript</text>
