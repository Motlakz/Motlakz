  <rect x="472" y="180" width="390" height="2" rx="1" fill="url(#orangeRose)"/>

  <!-- Glyph: ◉ — representing a timer/clock face -->
  <text x="496" y="222" font-family="Georgia, serif" font-size="26" fill="#ff8c42" opacity="0.9" text-anchor="middle">&#x25C9;</text>
  <line x1="508" y1="190" x2="508" y2="282" stroke="#1a2235" stroke-width="1"/>

  <text x="522" y="202" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-weight="700" fill="#dce4f0">Belly Clock</text>
  <text x="522" y="217" font-family="'Courier New', monospace" font-size="9.5" fill="#8494b0">Pregnancy milestone tracker for expecting parents.</text>
  <text x="522" y="231" font-family="'Courier New', monospace" font-size="9.5" fill="#8494b0">Week-by-week progress, health reminders, and a</text>
  <text x="522" y="245" font-family="'Courier New', monospace" font-size="9.5" fill="#8494b0">timeline that makes the journey feel less overwhelming.</text>

  <rect x="522" y="256" width="50" height="16" rx="8" fill="rgba(200,245,66,0.08)"  stroke="rgba(200,245,66,0.22)"  stroke-width="1"/>
  <text x="547" y="267" font-family="'Courier New', monospace" font-size="8" fill="#c8f542"  text-anchor="middle">Next.js</text>
  <rect x="578" y="256" width="40" height="16" rx="8" fill="rgba(97,218,251,0.07)"  stroke="rgba(97,218,251,0.22)"  stroke-width="1"/>
  <text x="598" y="267" font-family="'Courier New', monospace" font-size="8" fill="#61dafb"  text-anchor="middle">React</text>
  <rect x="624" y="256" width="62" height="16" rx="8" fill="rgba(109,179,232,0.07)" stroke="rgba(109,179,232,0.22)" stroke-width="1"/>
  <text x="655" y="267" font-family="'Courier New', monospace" font-size="8" fill="#6db3e8"  text-anchor="middle">PostgreSQL</text>
  <text x="700" y="267" font-family="'Courier New', monospace" font-size="8.5" fill="#ff8c42">bellyclock.com &#x2192;</text>

  <!-- ── PROJECT 3: Indie Launchers ── -->
  <rect x="472" y="302" width="390" height="110" rx="10" fill="#0c1018" stroke="#1a2235" stroke-width="1"/>
  <rect x="472" y="302" width="390" height="2" rx="1" fill="url(#blueGreen)"/>

  <!-- Glyph: &#x2023; right-pointing arrow / ► launch symbol -->
  <text x="496" y="344" font-family="Georgia, serif" font-size="28" fill="#4d9eff" opacity="0.9" text-anchor="middle">&#x25B6;</text>
  <line x1="508" y1="312" x2="508" y2="404" stroke="#1a2235" stroke-width="1"/>

  <text x="522" y="324" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-weight="700" fill="#dce4f0">Indie Launchers</text>
  <text x="522" y="339" font-family="'Courier New', monospace" font-size="9.5" fill="#8494b0">A community and toolkit for indie makers going to market.</text>
  <text x="522" y="353" font-family="'Courier New', monospace" font-size="9.5" fill="#8494b0">Launch checklists, peer accountability, and visibility</text>
  <text x="522" y="367" font-family="'Courier New', monospace" font-size="9.5" fill="#8494b0">tools — for builders who ship without a team behind them.</text>

  <rect x="522" y="378" width="50" height="16" rx="8" fill="rgba(200,245,66,0.08)"  stroke="rgba(200,245,66,0.22)"  stroke-width="1"/>
  <text x="547" y="389" font-family="'Courier New', monospace" font-size="8" fill="#c8f542"  text-anchor="middle">Next.js</text>
  <rect x="578" y="378" width="44" height="16" rx="8" fill="rgba(74,222,128,0.07)"  stroke="rgba(74,222,128,0.22)"  stroke-width="1"/>
  <text x="600" y="389" font-family="'Courier New', monospace" font-size="8" fill="#4ade80"  text-anchor="middle">Node.js</text>
  <rect x="628" y="378" width="62" height="16" rx="8" fill="rgba(109,179,232,0.07)" stroke="rgba(109,179,232,0.22)" stroke-width="1"/>
  <text x="659" y="389" font-family="'Courier New', monospace" font-size="8" fill="#6db3e8"  text-anchor="middle">PostgreSQL</text>
  <text x="700" y="389" font-family="'Courier New', monospace" font-size="8.5" fill="#4d9eff">indielaunchers.com &#x2192;</text>

