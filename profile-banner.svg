  <text x="273" y="332" font-family="'Courier New', monospace" font-size="9" fill="#3de8c8" text-anchor="middle" font-weight="700">REST APIs</text>
  <!-- Linux -->
  <rect x="312" y="318" width="46" height="20" rx="10" fill="rgba(251,191,36,0.07)"  stroke="rgba(251,191,36,0.22)"  stroke-width="1"/>
  <text x="335" y="332" font-family="'Courier New', monospace" font-size="9" fill="#fbbf24" text-anchor="middle" font-weight="700">Linux</text>

