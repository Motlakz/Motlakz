  <text x="78"  y="442" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#c8f542" text-anchor="middle">6+</text>
  <text x="78"  y="456" font-family="'Courier New', monospace" font-size="7.5" fill="#3d4f6a" text-anchor="middle" letter-spacing="1">PRODUCTS</text>

