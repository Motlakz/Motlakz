<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="limeCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c8f542"/>
      <stop offset="100%" stop-color="#3de8c8"/>
    </linearGradient>
    <linearGradient id="orangeRose" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ff8c42"/>
      <stop offset="100%" stop-color="#ff5e87"/>
    </linearGradient>
    <linearGradient id="blueGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4d9eff"/>
      <stop offset="100%" stop-color="#3de8c8"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#06080f"/>
      <stop offset="100%" stop-color="#0b0f1e"/>
    </linearGradient>
    <filter id="glowA" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60" result="blur"/>
    </filter>
    <filter id="glowB" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="50" result="blur"/>
    </filter>
    <clipPath id="roundClip">
      <rect width="900" height="500" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" rx="16" fill="url(#bgGrad)"/>

  <!-- Ambient glows (clipped) -->
  <g clip-path="url(#roundClip)">
    <circle cx="-40" cy="-40" r="320" fill="#c8f542" opacity="0.055" filter="url(#glowA)"/>
    <circle cx="940" cy="540" r="320" fill="#3de8c8" opacity="0.045" filter="url(#glowB)"/>
  </g>

  <!-- Grid lines -->
  <g clip-path="url(#roundClip)" opacity="0.035" stroke="#8888cc" stroke-width="1">
    <line x1="0" y1="40"  x2="900" y2="40"/>
    <line x1="0" y1="80"  x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="280" x2="900" y2="280"/>
    <line x1="0" y1="320" x2="900" y2="320"/>
    <line x1="0" y1="360" x2="900" y2="360"/>
    <line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="0" y1="440" x2="900" y2="440"/>
    <line x1="0" y1="480" x2="900" y2="480"/>
    <line x1="45"  y1="0" x2="45"  y2="500"/>
    <line x1="90"  y1="0" x2="90"  y2="500"/>
    <line x1="135" y1="0" x2="135" y2="500"/>
    <line x1="180" y1="0" x2="180" y2="500"/>
    <line x1="225" y1="0" x2="225" y2="500"/>
    <line x1="270" y1="0" x2="270" y2="500"/>
    <line x1="315" y1="0" x2="315" y2="500"/>
    <line x1="360" y1="0" x2="360" y2="500"/>
    <line x1="405" y1="0" x2="405" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
    <line x1="495" y1="0" x2="495" y2="500"/>
    <line x1="540" y1="0" x2="540" y2="500"/>
    <line x1="585" y1="0" x2="585" y2="500"/>
    <line x1="630" y1="0" x2="630" y2="500"/>
    <line x1="675" y1="0" x2="675" y2="500"/>
    <line x1="720" y1="0" x2="720" y2="500"/>
    <line x1="765" y1="0" x2="765" y2="500"/>
    <line x1="810" y1="0" x2="810" y2="500"/>
    <line x1="855" y1="0" x2="855" y2="500"/>
