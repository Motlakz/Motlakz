  <line x1="508" y1="68" x2="508" y2="160" stroke="#1a2235" stroke-width="1"/>

  <text x="522" y="80" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-weight="700" fill="#dce4f0">Quollie AI</text>
  <text x="522" y="95" font-family="'Courier New', monospace" font-size="9.5" fill="#8494b0">Quote generation &amp; proposal tooling for freelancers.</text>
  <text x="522" y="109" font-family="'Courier New', monospace" font-size="9.5" fill="#8494b0">Turns a brief into a structured, client-ready document</text>
  <text x="522" y="123" font-family="'Courier New', monospace" font-size="9.5" fill="#8494b0">in seconds — no more blank-page paralysis.</text>

