  <text x="547" y="145" font-family="'Courier New', monospace" font-size="8" fill="#c8f542"  text-anchor="middle">Next.js</text>
  <rect x="578" y="134" width="36" height="16" rx="8" fill="rgba(239,68,68,0.08)"   stroke="rgba(239,68,68,0.22)"   stroke-width="1"/>
  <text x="596" y="145" font-family="'Courier New', monospace" font-size="8" fill="#ef4444"  text-anchor="middle">Rails</text>
  <rect x="620" y="134" width="62" height="16" rx="8" fill="rgba(109,179,232,0.07)" stroke="rgba(109,179,232,0.22)" stroke-width="1"/>
  <text x="651" y="145" font-family="'Courier New', monospace" font-size="8" fill="#6db3e8"  text-anchor="middle">PostgreSQL</text>
  <text x="700" y="145" font-family="'Courier New', monospace" font-size="8.5" fill="#3de8c8">quollie.com &#x2192;</text>

  <!-- ── PROJECT 2: Belly Clock ── -->
