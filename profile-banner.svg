  <text x="162" y="442" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#3de8c8" text-anchor="middle">300+</text>
  <text x="162" y="456" font-family="'Courier New', monospace" font-size="7.5" fill="#3d4f6a" text-anchor="middle" letter-spacing="1">SIGN-UPS</text>

  <rect x="208" y="416" width="76" height="52" rx="8" fill="#0d111c" stroke="#1a2235" stroke-width="1"/>
  <text x="246" y="442" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#ff8c42" text-anchor="middle">93%</text>
  <text x="246" y="456" font-family="'Courier New', monospace" font-size="7.5" fill="#3d4f6a" text-anchor="middle" letter-spacing="1">SATISFACTION</text>

  <rect x="292" y="416" width="76" height="52" rx="8" fill="#0d111c" stroke="#1a2235" stroke-width="1"/>
  <text x="330" y="442" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#ff5e87" text-anchor="middle">4&#x2605;</text>
  <text x="330" y="456" font-family="'Courier New', monospace" font-size="7.5" fill="#3d4f6a" text-anchor="middle" letter-spacing="1">AVG RATING</text>

